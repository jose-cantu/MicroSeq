default_workdir: ~/microseq_runs
logging:
  dir:  ${MICROSEQ_LOG_DIR} 
  backup_count: 0
  session_env: MICROSEQ_SESSION_ID
tools:
  trimmomatic: trimmomatic
  blastn: blastn
  cap3: cap3
  vsearch: vsearch 
databases:
  gg2:
    blastdb: ${MICROSEQ_DB_HOME}/gg2/greengenes2_db
    taxonomy: ${MICROSEQ_DB_HOME}/gg2/taxonomy.tsv
    chimera_ref: ${MICROSEQ_DB_HOME}/gg2/dna-sequences.fasta
  silva:
    blastdb: ${MICROSEQ_DB_HOME}/silva/silva_db
    taxonomy: ${MICROSEQ_DB_HOME}/silva/taxonomy.tsv
    chimera_ref: ${MICROSEQ_DB_HOME}/silva/SILVA_138.1_SSURef_NR99_tax_silva_trunc.fasta
  ncbi:
    blastdb: ${MICROSEQ_DB_HOME}/ncbi/16S_ribosomal_RNA
    taxonomy: ${MICROSEQ_DB_HOME}/ncbi/taxonomy.tsv
metadata:
  sample_id_normaliser: strip_suffix_legacy
primer_trim:
  mode: off
  stage: post_quality
  preset: ""
  max_mismatch: 2
  max_search: 60
  max_primer_offset: 10
  iupac_mode: true
  post_quality_trim:
    enabled: false
    method: mott
    cutoff_q: 22
    window_size: 5
    per_base_q: 22
    rescue_5prime_bases: 0
  forward_primers: []
  reverse_primers: []
reporting:
  emit_engine_audit: true
  emit_per_sample_merge_report: true
merge_two_reads:
  overlap_engine: auto
  overlap_engine_strategy: cascade
  overlap_engine_order: [biopython, ungapped, edlib]
  anchor_tolerance_bases: 30
  min_overlap: 100
  min_identity: 0.8
trim:
  min_len: 200
  phred: 33
  trimmomatic:
    sliding_window_size: 5
    sliding_window_q: 20
  sanger:
    method: mott
    cutoff_q: 20
    window_size: 5
    per_base_q: 20
    file_q_threshold: 20.0
overlap_eval:
  min_overlap: 100
  min_identity: 0.8
  min_quality: 20.0
  quality_mode: warning
  ambiguity_identity_delta: 0.0
  ambiguity_quality_epsilon: 0.1
  high_conflict_q_threshold: 30
  high_conflict_action: flag
  cap3_validate_pair_support: false
